<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Receipt</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            /* Receipt Font */
            background-color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .receipt-card {
            background: white;
            padding: 30px;
            width: 300px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-top: 5px solid #ff5722;
            /* Orange top */
            position: relative;
        }

        /* The jagged edge at bottom of receipt */
        .receipt-card::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -10px;
            width: 100%;
            height: 10px;
            background: radial-gradient(circle, transparent 70%, white 75%) 0 0;
            background-size: 20px 20px;
        }

        h1 {
            margin: 0;
            font-size: 1.5em;
        }

        .order-id {
            font-size: 1.2em;
            font-weight: bold;
            margin: 10px 0;
            color: #333;
        }

        .divider {
            border-bottom: 2px dashed #ccc;
            margin: 15px 0;
        }

        /* The List of Items */
        .item-list {
            text-align: left;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .list-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .total {
            font-size: 1.3em;
            font-weight: bold;
            color: #2e7d32;
        }

        /* The QR Code Image */
        #qr-image {
            margin-top: 15px;
            width: 150px;
            height: 150px;
        }

        .home-btn {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 0.8em;
        }
    </style>
</head>

<body>

    <div class="receipt-card">
        <h1>Gwalior Canteen</h1>
        <div class="order-id">Order #<span id="display-id">0000</span></div>
        <div class="divider"></div>

        <div id="order-items" class="item-list">
        </div>

        <div class="divider"></div>
        <div class="total">Total: ₹<span id="display-total">0</span></div>

        <p style="font-size: 0.8em; color: #666; margin-top:10px;">Scan to Pay via UPI</p>

        <img id="qr-image" src="" alt="Payment QR">

        <br>
        <a href="index.html" class="home-btn" onclick="clearData()">Start New Order</a>
    </div>

    <script>
        // 1. Get Data from Memory
        const cart = JSON.parse(localStorage.getItem("canteen_cart")) || [];
        const total = localStorage.getItem("canteen_total") || 0;
        const orderId = localStorage.getItem("canteen_id") || "0000";

        // 2. Display the Info on Screen
        document.getElementById("display-id").innerText = orderId;
        document.getElementById("display-total").innerText = total;

        const listContainer = document.getElementById("order-items");

        // We will build a text string for the QR code while we display the list
        let qrData = `ORDER #${orderId}\n----------------\n`;

        cart.forEach(item => {
            // Add to the visual list
            const row = document.createElement("div");
            row.className = "list-row";
            row.innerHTML = `<span>${item.name}</span> <span>₹${item.price}</span>`;
            listContainer.appendChild(row);

            // Add to the QR Code text
            qrData += `${item.name}: ₹${item.price}\n`;
        });

        qrData += `----------------\nTOTAL: ₹${total}\n[VERIFIED ORDER]`;

        // 3. GENERATE THE ORDER QR CODE
        // We encode the text so it can be turned into a QR image
        // The manager scans this and sees the text immediately.

        const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrData)}`;

        document.getElementById("qr-image").src = qrApiUrl;

        // 4. Clear Data function (Same as before)
        function clearData() {
            localStorage.removeItem("canteen_cart");
            localStorage.removeItem("canteen_total");
            localStorage.removeItem("canteen_id");
        }
    </script>
</body>

</html>
