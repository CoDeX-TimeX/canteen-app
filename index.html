<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen Menu</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="header">
        <h1>Gwalior Canteen</h1>
        <p>Order food directly to your table</p>
    </div>

    <div id="menu-container" class="menu-grid">
        </div>

    <div class="cart-section">
        <div class="cart-summary">
            <span class="total-text">Total Bill</span>
            <span class="total-amount">₹<span id="total-price">0</span></span>
        </div>

        <ul id="cart-items" style="display:none;"></ul>

        <button onclick="goToCart()">View Cart &gt;</button>
    </div>

    <script src="menu.js"></script>
    <script>
        // 1. Load Cart from Memory on Start
        let cart = JSON.parse(localStorage.getItem("canteen_cart")) || [];

        // 2. Display the Menu
        function displayMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = ''; // Clear current list to rebuild it

            if (typeof menuItems === 'undefined') {
                container.innerHTML = '<p>Error: DB not found.</p>';
                return;
            }

            menuItems.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'menu-item';

                // Check how many of THIS item are in the cart
                const qty = getQty(item.id);

                // Decide: Show "ADD" button OR " - 1 + " controls?
                let buttonHTML = '';
                
                if (qty === 0) {
                    // Show normal ADD button
                    buttonHTML = `<button class="add-btn" onclick="addOne(${item.id})">ADD</button>`;
                } else {
                    // Show Counter Control
                    buttonHTML = `
                        <div class="qty-control-menu">
                            <button class="qty-btn-menu" onclick="removeOne(${item.id})">−</button>
                            <span class="qty-count-menu">${qty}</span>
                            <button class="qty-btn-menu" onclick="addOne(${item.id})">+</button>
                        </div>
                    `;
                }
                
                // Build the Card
                itemDiv.innerHTML = `
                    <div class="item-icon">${item.image}</div>
                    <div class="item-details">
                        <h3>${item.name}</h3>
                        <p class="price">₹${item.price}</p>
                    </div>
                    ${buttonHTML}
                `;
                container.appendChild(itemDiv);
            });
            
            updateTotalBar();
        }

        // --- HELPER FUNCTIONS ---

        // Count how many of a specific item we have
        function getQty(id) {
            return cart.filter(i => i.id === id).length;
        }

        // Add 1 item
        function addOne(id) {
            const item = menuItems.find(i => i.id === id);
            cart.push(item);
            saveAndRefresh();
        }

        // Remove 1 item
        function removeOne(id) {
            // Find index of first matching item
            const index = cart.findIndex(i => i.id === id);
            if (index > -1) {
                cart.splice(index, 1); // Remove it
            }
            saveAndRefresh();
        }

        // Save to memory and refresh the screen
        function saveAndRefresh() {
            localStorage.setItem("canteen_cart", JSON.stringify(cart));
            displayMenu(); // Re-draw buttons (so "ADD" turns into "- 1 +")
            updateTotalBar(); // Update the price at the bottom
        }

        // Update the Bottom Bar
        function updateTotalBar() {
            const totalSpan = document.getElementById('total-price');
            let total = 0;
            cart.forEach(item => total += item.price);
            totalSpan.innerText = total;
        }

        // Go to Cart Page
        function goToCart() {
            if (cart.length === 0) {
                alert("Cart is empty!");
                return;
            }
            window.location.href = "cart.html";
        }

        // Start the App
        displayMenu();
    </script>

    <button onclick="resetDailyCounter()" style="margin-top: 50px; opacity: 0.3; font-size: 10px;">
        (Manager Only: Reset Counter)
    </button>
    <script>
        function resetDailyCounter() {
            const password = prompt("Enter Manager Password:");
            if (password === "admin123") { 
                localStorage.setItem("canteen_order_counter", 99); 
                alert("Counter reset!");
            }
        }
    </script>
</body>

</html>
